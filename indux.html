<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #090b10;
            color: white;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            padding: 18px 40px;
            background: rgba(0, 0, 0, 0.7);
        }

        nav h1 {
            color: #00ffcc;
            font-size: 1.2rem;
        }

        nav a {
            color: #d1d9e0;
            text-decoration: none;
            font-weight: 600;
        }

        .page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }

        .profile-card {
            width: 100%;
            max-width: 760px;
            background: rgba(18, 20, 25, 0.98);
            border: 1px solid rgba(0, 255, 204, 0.12);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 28px 70px rgba(0, 0, 0, 0.35);
        }

        .profile-card h2 {
            font-size: 2.5rem;
            color: #00ffcc;
            margin-bottom: 8px;
        }

        .profile-card p {
            margin-bottom: 30px;
            line-height: 1.7;
            color: #b9c2cf;
        }

        .summary {
            background: rgba(0, 255, 204, 0.06);
            border: 1px solid rgba(0, 255, 204, 0.18);
            border-radius: 18px;
            padding: 18px 20px;
            margin-bottom: 28px;
        }

        .summary h3 {
            margin-bottom: 12px;
            color: #d1f2ec;
            font-size: 1.1rem;
        }

        .summary p {
            color: #e1eef6;
            font-size: 0.96rem;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #c8d2da;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #2c2f36;
            background: #0d1016;
            color: #f5f9ff;
            font-size: 1rem;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .btn {
            width: 100%;
            padding: 16px 0;
            margin-top: 10px;
            border: none;
            border-radius: 14px;
            background: #00ffcc;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        @media (max-width: 720px) {
            nav {
                flex-direction: column;
                align-items: flex-start;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <nav>
        <h1>Academy Profile Builder</h1>
        <a href="sirje.html">Back to Admission</a>
    </nav>

    <main class="page">
        <div class="profile-card">
            <h2>Complete Your Profile</h2>
            <p>Finish your profile details so we can create your academy profile. We filled in the information you
                already provided.</p>

            <section class="summary" id="summary">
                <h3>Your submitted information</h3>
                <p id="summary-text">No submitted data found. Please go back and submit your admission details.</p>
            </section>

            <form>
                <div class="form-row">
                    <div class="form-group">
                        <label for="profile-name">Name</label>
                        <input type="text" id="profile-name" name="profile-name" readonly>
                    </div>
                    <div class="form-group">
                        <label for="profile-email">Email</label>
                        <input type="email" id="profile-email" name="profile-email" readonly>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="profile-batch">Batch</label>
                        <input type="text" id="profile-batch" name="profile-batch" readonly>
                    </div>
                    <div class="form-group">
                        <label for="profile-contact">Contact Number</label>
                        <input type="tel" id="profile-contact" name="profile-contact" readonly>
                    </div>
                </div>

                <div class="form-group">
                    <label for="profile-bio">Short Bio</label>
                    <textarea id="profile-bio" name="profile-bio" placeholder="Tell us about yourself"
                        required></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="skills">Skills</label>
                        <input type="text" id="skills" name="skills" placeholder="HTML, CSS, JavaScript">
                    </div>
                    <div class="form-group">
                        <label for="goals">Learning Goals</label>
                        <input type="text" id="goals" name="goals" placeholder="What do you want to learn?">
                    </div>
                </div>

                <div class="form-group">
                    <label for="profile-pic">Profile Picture</label>
                    <input type="file" id="profile-pic" name="profile-pic" accept="image/*">
                </div>

                <button type="submit" class="btn">Save Profile</button>
            </form>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const fields = [
            { key: 'name', label: 'Name' },
            { key: 'father-name', label: "Father's Name" },
            { key: 'qualification', label: 'Qualification' },
            { key: 'age', label: 'Age' },
            { key: 'batch', label: 'Batch' },
            { key: 'email', label: 'Email' },
            { key: 'contact', label: 'Contact Number' },
            { key: 'address', label: 'Address' }
        ];

        const summaryText = document.getElementById('summary-text');
        const summaryLines = [];

        fields.forEach(field => {
            const value = params.get(field.key);
            if (value) {
                summaryLines.push(`${field.label}: ${decodeURIComponent(value)}`);
            }
        });

        if (summaryLines.length > 0) {
            summaryText.textContent = summaryLines.join(' \n');
        }

        document.getElementById('profile-name').value = params.get('name') || '';
        document.getElementById('profile-email').value = params.get('email') || '';
        document.getElementById('profile-batch').value = params.get('batch') || '';
        document.getElementById('profile-contact').value = params.get('contact') || '';
    </script>
</body>

</html>
